<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        body {
            background-color: #f8f9fa;
        }

        .form-card {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        .btn {
            border-radius: 8px;
        }

        .error-text {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
</head>

<body class="container">

    <div class="form-card">
        <h2 class="text-success fw-bold mb-4 text-center">
            📘 Add Book
        </h2>

        <form th:action="@{/save}" th:object="${book}" method="post">

            <div class="mb-3">
                <label class="form-label">Title</label>
                <input type="text"
                       class="form-control"
                       th:field="*{title}"
                       placeholder="Enter book title"/>

                <p class="error-text"
                   th:if="${#fields.hasErrors('title')}"
                   th:text="${#fields.errors('title')}"></p>
            </div>

            <div class="mb-3">
                <label class="form-label">Author</label>
                <input type="text"
                       class="form-control"
                       th:field="*{author}"
                       placeholder="Enter author name"/>

                <p class="error-text"
                   th:if="${#fields.hasErrors('author')}"
                   th:text="${#fields.errors('author')}"></p>
            </div>

            <div class="mb-4">
                <label class="form-label">Price</label>
                <input type="number"
                       step="0.01"
                       class="form-control"
                       th:field="*{price}"
                       placeholder="Enter price"/>

                <p class="error-text"
                   th:if="${#fields.hasErrors('price')}"
                   th:text="${#fields.errors('price')}"></p>
            </div>

            <div class="d-flex justify-content-between">
                <a href="/" class="btn btn-secondary px-4">
                    Back
                </a>

                <button type="submit" class="btn btn-success px-4">
                    Save
                </button>
            </div>

        </form>
    </div>

</body>
</html>
